<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  User font rendering overrides. Applies to fontconfig clients: Sway, Chrome
  (native Wayland), GTK/Qt apps. NOT X11 Xft.* (see ~/dotfiles/.Xresources,
  which is X11-only and unused in the Sway session).

  Values pin Arch's current defaults, plus rgba=none: subpixel/LCD antialiasing
  is dropped under fractional scaling anyway (Skia disables it when device
  scale > 1), so grayscale avoids any color fringing. slight hinting suits HiDPI.
-->
<fontconfig>
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting"   mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba"      mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>
</fontconfig>
